# ═══════════════════════════════════════════════════════════
# Config Server — application.yml
# Port: 8888
# Reads config from a local file directory: config-repo/
# ═══════════════════════════════════════════════════════════
server:
  port: ${CONFIG_SERVER_PORT:8888}

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_REPO_PATH:file:///${user.dir}/../config-repo}
  # Basic security for Config Server
  security:
    user:
      name: ${CONFIG_SERVER_USERNAME:config}
      password: ${CONFIG_SERVER_PASSWORD:config-secret}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.agritech: DEBUG
