version: '3.8'

services:
  # ==========================================
  # Infrastructure
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: agritech_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agritech_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: agritech_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  kafka:
    image: bitnami/kafka:3.5.1
    container_name: agritech_kafka
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==========================================
  # Platform Services
  # ==========================================
  config-server:
    build:
      context: .
      args:
        MODULE_NAME: config-server
    container_name: agritech_config
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: .
      args:
        MODULE_NAME: eureka-server
    container_name: agritech_eureka
    ports:
      - "8761:8761"
    environment:
      - CONFIG_SERVER_HOST=config-server
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      args:
        MODULE_NAME: api-gateway
    container_name: agritech_gateway
    ports:
      - "8080:8080"
    environment:
      - CONFIG_SERVER_HOST=config-server
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - REDIS_HOST=redis
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==========================================
  # Domain Services
  # ==========================================
  auth-service:
    <<: &service-template
      environment:
        - CONFIG_SERVER_HOST=config-server
        - EUREKA_URL=http://eureka-server:8761/eureka/
        - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/agritech_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
        - SPRING_DATASOURCE_USERNAME=root
        - SPRING_DATASOURCE_PASSWORD=root
        - REDIS_HOST=redis
        - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
        - SPRING_PROFILES_ACTIVE=prod
        - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m
      depends_on:
        eureka-server:
          condition: service_healthy
        mysql:
          condition: service_healthy
        kafka:
          condition: service_healthy
    build:
      context: .
      args:
        MODULE_NAME: auth-service
    container_name: agritech_auth
    ports:
      - "8081:8081"

  user-service:
    <<: *service-template
    build:
      context: .
      args:
        MODULE_NAME: user-service
    container_name: agritech_user
    ports:
      - "8082:8082"

  product-service:
    <<: *service-template
    build:
      context: .
      args:
        MODULE_NAME: product-service
    container_name: agritech_product
    ports:
      - "8083:8083"

  cart-service:
    <<: *service-template
    build:
      context: .
      args:
        MODULE_NAME: cart-service
    container_name: agritech_cart
    ports:
      - "8084:8084"

  wishlist-service:
    <<: *service-template
    build:
      context: .
      args:
        MODULE_NAME: wishlist-service
    container_name: agritech_wishlist
    ports:
      - "8085:8085"

  order-service:
    <<: *service-template
    build:
      context: .
      args:
        MODULE_NAME: order-service
    container_name: agritech_order
    ports:
      - "8086:8086"

  rating-service:
    <<: *service-template
    build:
      context: .
      args:
        MODULE_NAME: rating-service
    container_name: agritech_rating
    ports:
      - "8087:8087"

  chat-service:
    <<: *service-template
    build:
      context: .
      args:
        MODULE_NAME: chat-service
    container_name: agritech_chat
    ports:
      - "8088:8088"

  notification-service:
    <<: *service-template
    build:
      context: .
      args:
        MODULE_NAME: notification-service
    container_name: agritech_notification
    ports:
      - "8089:8089"

  admin-service:
    <<: *service-template
    build:
      context: .
      args:
        MODULE_NAME: admin-service
    container_name: agritech_admin
    ports:
      - "8090:8090"

volumes:
  mysql-data:
  redis-data:
  kafka-data:
