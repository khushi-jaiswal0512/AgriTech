# ═══════════════════════════════════════════════════════════
# Chat Service Configuration
# Port: 8088 | DB: chat_db
# WebSocket + STOMP for real-time messaging
# ═══════════════════════════════════════════════════════════
server:
  port: 8088

spring:
  application:
    name: chat-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/chat_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
