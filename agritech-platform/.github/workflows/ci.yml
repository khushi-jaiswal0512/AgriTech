name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Build Docker Images
        run: |
          docker build --build-arg MODULE_NAME=config-server -t agritech/config-server .
          docker build --build-arg MODULE_NAME=eureka-server -t agritech/eureka-server .
          docker build --build-arg MODULE_NAME=api-gateway -t agritech/api-gateway .
          docker build --build-arg MODULE_NAME=auth-service -t agritech/auth-service .
          docker build --build-arg MODULE_NAME=user-service -t agritech/user-service .
          docker build --build-arg MODULE_NAME=product-service -t agritech/product-service .
          docker build --build-arg MODULE_NAME=cart-service -t agritech/cart-service .
          docker build --build-arg MODULE_NAME=wishlist-service -t agritech/wishlist-service .
          docker build --build-arg MODULE_NAME=order-service -t agritech/order-service .
          docker build --build-arg MODULE_NAME=rating-service -t agritech/rating-service .
          docker build --build-arg MODULE_NAME=chat-service -t agritech/chat-service .
          docker build --build-arg MODULE_NAME=notification-service -t agritech/notification-service .
          docker build --build-arg MODULE_NAME=admin-service -t agritech/admin-service .

      # Note: Docker Push and EC2 Deployment steps can be added here once AWS credentials are set up in repository secrets.
